name: Databricks CI/CD
 
on:
  push:
    branches:
      - main
 
jobs:
  deploy:
    runs-on: ubuntu-latest
 
    steps:
      # ✅ Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
 
      # ✅ Step 2: Install Databricks CLI
      - name: Install Databricks CLI
        run: pip install databricks-cli
 
      # ✅ Step 3: Set Databricks environment
      - name: Set Databricks Environment
        run: |
          echo "DATABRICKS_HOST=${{ secrets.DATABRICKS_HOST }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN }}" >> $GITHUB_ENV
 
      # ✅ Step 4: Update Repo in Databricks
      - name: Update Repo (Auto Pull)
        run: |
          databricks repos update \
          --path "/Repos/bhaveshwaghttl@gmail.com/Databricks-CICD-POC" \
          --branch main
 
      # ✅ Step 5: Detect changed files (FIXED VERSION)
      - name: Detect Changed Files
        run: |
          git fetch --depth=2
          git diff --name-only HEAD~1 HEAD > files.txt
          echo "=========== Changed files ==========="
          cat files.txt
 
      # ✅ Step 6: Trigger Job1 (job_notebook.py)
      - name: Trigger Job1
        run: |
          if grep -q "notebooks/job_notebook.py" files.txt; then
            echo "✅ Triggering Job1"
            databricks jobs run-now --job-id 1097572975471212
          else
            echo "❌ Job1 not changed"
          fi
 
